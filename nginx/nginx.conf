# nginx/nginx.conf

events {
  worker_connections 1024;
}

http {
  # ── Docker internal DNS resolver ──────────────────────────────────────────────
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 80;

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /api/auth/ {
      set $auth_upstream http://auth-services:4001;
      proxy_pass         $auth_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Socket.IO (chat-services) ─────────────────────────────────────────────
    location /socket.io/ {
      set $chat_upstream http://chat-services:4002;
      proxy_pass         $chat_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 3600s;   # keep socket alive for 1 hour
      proxy_send_timeout 3600s;
    }

    # ── Chat API (health check etc) ───────────────────────────────────────────
    location /api/chat/ {
      set $chat_upstream http://chat-services:4002;
      proxy_pass         $chat_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
      set $frontend_upstream http://frontend:3000;
      proxy_pass         $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}