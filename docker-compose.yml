# docker-compose.yml (root)

services:

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-services
      - chat-services
    networks: [chatnet]
    restart: unless-stopped

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_URL=http://localhost/api/auth
      - NEXT_PUBLIC_SOCKET_URL=http://localhost
    depends_on:
      - auth-services
      - chat-services
    networks: [chatnet]
    restart: unless-stopped

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-services:
    build: ./services/auth-services
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost
      - ACCESS_TOKEN_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - ACCESS_TOKEN_SECRET=replace_with_your_64_char_random_secret_here_abc
      - REFRESH_TOKEN_SECRET=replace_with_your_64_char_random_secret_here_xyz
    depends_on:
      redis:
        condition: service_healthy
    networks: [chatnet]
    restart: unless-stopped

  # ── Chat / Realtime Service (Socket.IO) ───────────────────────────────────────
  chat-services:
    build: ./services/chat-services
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongo:27017/chatapp
      - CLIENT_URL=http://localhost
      - ACCESS_TOKEN_SECRET=replace_with_your_64_char_random_secret_here_abc
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks: [chatnet]
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [chatnet]
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [chatnet]
    restart: unless-stopped

networks:
  chatnet:

volumes:
  redis_data:
  mongo_data: